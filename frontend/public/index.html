<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Система управления парковкой</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🅿️ Система управления парковкой</h1>
        </header>

        <main>
            <!-- Форма добавления новой парковки -->
            <section class="section">
                <h2>Создать новую резервацию</h2>
                <form id="bookingForm" class="form">
                    <div class="form-group">
                        <label for="clientName">Имя клиента:</label>
                        <input type="text" id="clientName" name="clientName" required />
                    </div>

                    <div class="form-group">
                        <label for="phoneNumber">Номер телефона:</label>
                        <input type="tel" id="phoneNumber" name="phoneNumber" pattern="\+\d{1,15}" required />
                    </div>

                    <div class="form-group">
                        <label for="carNumber">Номер автомобиля:</label>
                        <input type="text" id="carNumber" name="carNumber" required />
                    </div>

                    <div class="form-group">
                        <label for="spotNumber">Номер места:</label>
                        <input type="number" id="spotNumber" name="spotNumber" min="1" required />
                    </div>

                    <div class="form-group">
                        <label for="startTime">Время начала:</label>
                        <input type="datetime-local" id="startTime" name="startTime" required />
                    </div>

                    <button type="submit" class="btn btn-primary">Создать резервацию</button>
                </form>
                <div id="formMessage" class="message"></div>
            </section>

            <!-- Список активных парковок -->
            <section class="section">
                <h2>Активные парковки</h2>
                <div id="recordsList" class="records-list">
                    <p>Загрузка...</p>
                </div>
            </section>

            <!-- Поиск по номеру телефона -->
            <section class="section">
                <h2>Поиск парковок по телефону</h2>
                <form id="searchForm" class="form">
                    <div class="form-group">
                        <label for="searchPhone">Номер телефона:</label>
                        <input type="tel" id="searchPhone" name="searchPhone" pattern="\+\d{1,15}" required />
                    </div>
                    <button type="submit" class="btn btn-secondary">Поиск</button>
                </form>
                <div id="searchResults" class="records-list"></div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Система управления парковкой</p>
        </footer>
    </div>

    <script src="/app.js"></script>
</body>
</html>
